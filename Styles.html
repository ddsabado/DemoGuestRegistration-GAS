  .bg-panel-overlay {

  /* Scrollable right form panel */
  .form-panel {
    margin-left: 42%;
    width: 58%;
    min-height: 100vh;
    height: 100vh;
    overflow-y: auto;
    background: var(--bs-50);
    padding: 36px 40px 56px;
    position: relative;
    z-index: 1;
  }

  .page-wrap { max-width: 560px; margin: 0 auto; }

  /* Brand header */
  .brand-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--bs-100);
  }
  .brand-logo {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--pb-600);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(81,122,123,0.3);
  }
  .brand-logo svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .brand-name { font-size: 1rem; font-weight: 700; color: var(--bs-900); letter-spacing: -.01em; }
  .brand-tagline { font-size: .75rem; color: var(--muted); margin-top: 1px; }

  /* Page heading */
  .page-heading { margin-bottom: 20px; }
  .page-heading h2 { font-size: 1.4rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; color: var(--bs-900); }
  .page-sub { font-size: .85rem; color: var(--muted); }

  /* Step indicator */
  .steps { display: flex; align-items: center; margin-bottom: 24px; }
  .step { display: flex; align-items: center; gap: 8px; font-size: .8rem; font-weight: 600; color: var(--muted); }
  .step .num {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--bs-100); color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem; font-weight: 700; flex-shrink: 0;
    transition: background .2s, color .2s;
  }
  .step.active .num { background: var(--pb-500); color: #fff; }
  .step.active { color: var(--bs-800); }
  .step-line { flex: 1; height: 2px; background: var(--bs-100); margin: 0 10px; border-radius: 99px; }

  /* Cards */
  .card {
    background: #fff;
    border: 1px solid var(--bs-100);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(18,27,33,0.06);
  }
  .card-title { font-size: .7rem; font-weight: 700; color: var(--pb-600); text-transform: uppercase; letter-spacing: .09em; margin-bottom: 14px; }

  h3 { font-size: .95rem; font-weight: 600; }

  label { display: block; font-size: .78rem; font-weight: 600; color: var(--bs-600); margin-bottom: 5px; margin-top: 12px; }
  input, select {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--bs-200); border-radius: 8px;
    font-size: .88rem; font-family: inherit; color: var(--text);
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus {
    outline: none; border-color: var(--pb-400);
    box-shadow: 0 0 0 3px var(--accent-ring);
  }
  input.invalid { border-color: var(--invalid-border); background: var(--invalid-bg); }
  input[type=file] { padding: 7px 10px; color: var(--muted); font-size: .8rem; cursor: pointer; }
  input[type=file]::file-selector-button {
    background: var(--pb-50); border: 1px solid var(--pb-200); border-radius: 6px;
    color: var(--pb-700); padding: 4px 10px; font-size: .78rem; font-weight: 600;
    cursor: pointer; margin-right: 8px; font-family: inherit;
  }

  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  .muted { color: var(--muted); font-size: .8rem; margin-top: 4px; }

  .error { color: var(--danger); background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: 8px; padding: 8px 12px; margin-top: 10px; font-size: .82rem; }
  .ok { color: var(--success); background: var(--success-bg); border: 1px solid var(--success-border); border-radius: 8px; padding: 8px 12px; margin-top: 10px; font-size: .82rem; }

  .btnRow { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
  button { padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; font-size: .88rem; font-weight: 600; font-family: inherit; transition: all .15s; }
  button.primary { background: var(--pb-600); color: #fff; box-shadow: 0 2px 8px rgba(81,122,123,0.3); }
  button.primary:hover { background: var(--pb-700); }
  button.secondary { background: var(--bs-100); border: 1px solid var(--bs-200); color: var(--bs-700); }
  button.secondary:hover { background: var(--bs-200); }
  button.ghost { background: transparent; border: 1px solid var(--pb-300); color: var(--pb-700); font-size: .82rem; padding: 7px 14px; }
  button.ghost:hover { background: var(--pb-50); border-color: var(--pb-400); }
  button:disabled { opacity: .45; cursor: not-allowed; }

  /* Guest blocks */
  .guestGrid { display: flex; flex-direction: column; gap: 12px; margin-top: 14px; }
  .guest-block { background: var(--bs-50); border: 1px solid var(--bs-100); border-radius: 10px; padding: 14px; transition: border-color .15s; }
  .guest-block:focus-within { border-color: var(--pb-300); }
  .guest-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .guest-block-title { font-size: .72rem; font-weight: 700; color: var(--pb-600); text-transform: uppercase; letter-spacing: .07em; }
  .guest-block label { margin-top: 10px; }
  .guest-block label:first-of-type { margin-top: 0; }
  .guest-row { display: flex; gap: 10px; }
  .guest-row > div { flex: 1; }
  .add-guest-btn-wrap { margin-top: 12px; }

  .hidden { display: none; }
  .pill { display: inline-block; padding: 5px 12px; border-radius: 999px; font-size: .75rem; font-weight: 600; }
  .pill.warn { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-text); }

  .reviewTable { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .reviewTable td { border-top: 1px solid var(--bs-100); padding: 10px 0; vertical-align: top; font-size: .85rem; }
  .reviewTable td:first-child { width: 180px; color: var(--muted); font-weight: 500; }

  .small { font-size: .75rem; }
  .fieldError { color: var(--danger); font-size: .75rem; margin-top: 4px; }
  .fileList { margin: 6px 0 0; padding-left: 18px; font-size: .8rem; color: var(--muted); }

  @media (max-width: 800px) {
    body { display: block; overflow: auto; }
    .bg-panel { position: relative; width: 100%; height: 200px; }
    .form-panel { margin-left: 0; width: 100%; height: auto; overflow-y: visible; padding: 24px 16px 48px; }
    .row { flex-direction: column; }
    .guest-row { flex-direction: column; }
  }
